<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light">
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; color-scheme: light; }
        embed { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <embed id="viewer" type="application/pdf">
    <script>
        var params = new URLSearchParams(window.location.search);
        document.getElementById('viewer').src = params.get('file');
    </script>
</body>
</html>
